<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Function Plotter – Version 3 (Export)</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        #plot { width: 100%; height: 80vh; }
        .row { margin-bottom: 10px; }
        button { padding: 6px 12px; margin-right: 10px; }
    </style>
</head>
<body>

<h2>3D Function Plotter – Version 3 (Export)</h2>

<div class="row">
    <label>Beispiel-Funktion:</label>
    <select id="exampleSelect">
        <option value="Math.sin(x)*Math.cos(y)">z = sin(x)·cos(y)</option>
        <option value="Math.sin(Math.sqrt(xx+yy))">z = sin(√(x²+y²))</option>
        <option value="xx - yy">z = x² - y²</option>
        <option value="Math.sin(x*y)">z = sin(x·y)</option>
    </select>
</div>

<div class="row">
    <label>Eigene Funktion z = </label>
    <input id="functionInput" type="text" size="40" value="Math.sin(x)*Math.cos(y)">
</div>

<div class="row">
    <label>Auflösung:</label>
    <input id="resolutionSlider" type="range" min="20" max="200" value="60">
    <span id="resLabel">60</span>
</div>

<div class="row">
    <button id="exportPngBtn">📸 Export PNG</button>
    <button id="exportJsonBtn">📄 Export JSON</button>
    <button id="exportFuncBtn">📝 Export Funktion</button>
</div>

<div id="plot"></div>

<script>
    let lastData = { x: [], y: [], z: [] };

    function generatePlot() {
        let funcText = document.getElementById("functionInput").value;
        let resolution = parseInt(document.getElementById("resolutionSlider").value);

        let x = [], y = [];
        for (let i = -10; i <= 10; i += 20/resolution) x.push(i);
        for (let j = -10; j <= 10; j += 20/resolution) y.push(j);

        let z = [];
        for (let i = 0; i < x.length; i++) {
            let row = [];
            for (let j = 0; j < y.length; j++) {
                let xVal = x[i], yVal = y[j];
                try {
                    row.push(eval(funcText));
                } catch {
                    row.push(NaN);
                }
            }
            z.push(row);
        }

        lastData = { x, y, z };

        Plotly.newPlot("plot", [{
            z: z, x: x, y: y, type: "surface"
        }], {
            title: "3D Plot"
        });
    }

    function exportPNG() {
        Plotly.downloadImage("plot", {
            format: "png",
            filename: "3d_plot"
        });
    }

    function exportJSON() {
        let blob = new Blob([JSON.stringify(lastData, null, 2)], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "plot_data.json";
        a.click();
    }

    function exportFunction() {
        let func = document.getElementById("functionInput").value;
        let blob = new Blob([func], { type: "text/plain" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "function.txt";
        a.click();
    }

    document.getElementById("exampleSelect").addEventListener("change", e => {
        document.getElementById("functionInput").value = e.target.value;
        generatePlot();
    });

    document.getElementById("resolutionSlider").addEventListener("input", e => {
        document.getElementById("resLabel").innerText = e.target.value;
        generatePlot();
    });

    document.getElementById("exportPngBtn").addEventListener("click", exportPNG);
    document.getElementById("exportJsonBtn").addEventListener("click", exportJSON);
    document.getElementById("exportFuncBtn").addEventListener("click", exportFunction);

    generatePlot();
</script>

</body>
</html>
